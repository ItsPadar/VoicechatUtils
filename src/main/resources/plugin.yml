name: voicechatutils
version: '1.0'
main: itspadar.voicechatutils.VoicechatUtils
api-version: '1.21'
prefix: VoicechatUtils
authors: [ Its_Padar ]
website: https://modrinth.com/plugin/voicechat-utils
description: Add a way for players without mics to use voice chat groups!
depend: [ voicechat ]
permissions:
  voicechatutils.chat.use:
    description: "Use /mg to message users in current voice chat group"
    default: true
  voicechatutils.chat.spy:
    description: "See all usages of /messagegroup"
    default: false
commands:
  messagegroup:
    description: "Message players in the current voice chat group!"
    usage: "/mg <message you want to send>"
    aliases: [ mg ]
    permission: voicechatutils.chat.use
    permission-message: "You do not have permission to use this command"